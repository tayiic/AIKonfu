<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIKonfu - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #0c0c1d 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeInUp 1.2s ease-out;
        }

        .logo-wrapper {
            margin-bottom: 48px;
        }

        .logo-wrapper img {
            width: 280px;
            max-width: 80vw;
            height: auto;
            filter: drop-shadow(0 0 40px rgba(100, 140, 255, 0.3));
            transition: filter 0.3s ease;
        }

        .logo-wrapper img:hover {
            filter: drop-shadow(0 0 60px rgba(100, 140, 255, 0.5));
        }

        h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 16px;
            background: linear-gradient(90deg, #648cff, #a78bfa, #648cff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite;
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.15em;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 0.95rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.1em;
            margin-top: 32px;
        }

        .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #648cff;
            margin-left: 8px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shimmer {
            to {
                background-position: 200% center;
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.4;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.3);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <img src="logo/logo3.png" alt="AIKonfu Logo">
        </div>
        <h1>Coming Soon</h1>
        <p class="subtitle">AI-Powered Technology Analysis & Entrepreneurship</p>
        <p class="tagline">aikonfu.com <span class="pulse-dot"></span></p>
    </div>
</body>
</html>
