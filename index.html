<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIKonfu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
            color: #1d1d1f;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            text-align: center;
            animation: fadeIn 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }

        .logo-wrapper {
            margin-bottom: 40px;
        }

        .logo-wrapper img {
            width: 420px;
            max-width: 75vw;
            height: auto;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .logo-wrapper img:hover {
            transform: scale(1.02);
        }

        h1 {
            font-size: 1.125rem;
            font-weight: 400;
            letter-spacing: -0.01em;
            color: #86868b;
            margin-bottom: 8px;
        }

        .domain {
            font-size: 0.8125rem;
            font-weight: 400;
            color: #86868b;
            letter-spacing: 0.02em;
            opacity: 0;
            animation: fadeIn 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.6s both;
        }

        .tool-link {
            display: inline-block;
            margin-top: 32px;
            padding: 10px 24px;
            font-size: 0.8125rem;
            font-weight: 500;
            color: #0071e3;
            text-decoration: none;
            letter-spacing: -0.01em;
            border: 1px solid #0071e3;
            border-radius: 980px;
            transition: background 0.3s, color 0.3s;
            opacity: 0;
            animation: fadeIn 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 1s both;
        }

        .tool-link:hover {
            background: #0071e3;
            color: #ffffff;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <img src="logo/logo3.png" alt="AIKonfu">
        </div>
        <h1>Coming Soon</h1>
        <p class="domain">aikonfu.com</p>
        <a class="tool-link" href="ip-check.html">IP 纯净度检测 ›</a>
    </div>
</body>
</html>
